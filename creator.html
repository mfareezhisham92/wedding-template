<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Creator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
background:#080604;
color:#f3ead8;
font-family:Georgia,serif;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.app{
width:100%;
max-width:430px;
border:1px solid #cda85d;
border-radius:26px;
padding:30px 22px;
background:#151006;
box-shadow:0 0 45px rgba(205,168,93,.18);
}

.small{
font-size:12px;
letter-spacing:.18em;
text-transform:uppercase;
color:#cda85d;
margin-bottom:20px;
}

.reflection{
font-size:18px;
line-height:1.7;
color:#d8c7a5;
font-style:italic;
margin-bottom:26px;
}

h1{
font-size:29px;
line-height:1.25;
margin-bottom:18px;
}

textarea{
width:100%;
min-height:130px;
background:#080604;
border:1px solid rgba(205,168,93,.55);
color:#fff;
padding:15px;
border-radius:14px;
font-size:16px;
line-height:1.5;
}

.encouragement{
font-size:15px;
line-height:1.6;
color:#cdbb92;
margin-top:18px;
min-height:45px;
opacity:.85;
}

button{
width:100%;
margin-top:18px;
padding:14px;
border-radius:14px;
border:1px solid #cda85d;
background:transparent;
color:#f4d88d;
font-size:18px;
cursor:pointer;
}

.dots{
display:flex;
gap:7px;
margin-bottom:22px;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
border:1px solid #cda85d;
opacity:.5;
}

.dot.active{
background:#cda85d;
opacity:1;
}

.fade{
opacity:0;
transform:translateY(12px);
transition:.45s ease;
}

.show{
opacity:1;
transform:translateY(0);
transition:.45s ease;
}

#craftingArea{
display:none;
text-align:center;
}

.craft-line{
width:100%;
height:1px;
margin-top:30px;
background:linear-gradient(90deg,transparent,#cda85d,transparent);
animation:craftGlow 1.8s ease-in-out infinite;
}

@keyframes craftGlow{
0%,100%{opacity:.25;transform:scaleX(.4)}
50%{opacity:1;transform:scaleX(1)}
}
#atmosphereArea button span{
display:block;
font-size:14px;
color:#d8c7a5;
margin-top:5px;
font-style:italic;
}  
</style>
</head>

<body>

<div class="app">

<div id="atmosphereArea">
  <div class="small">Choose the feeling</div>
  <h1>How would you like to remember today?</h1>

  <button onclick="chooseAtmosphere('calm')">🤍 Calm<br><span>A quiet moment to reflect.</span></button>
  <button onclick="chooseAtmosphere('nostalgic')">🌙 Nostalgic<br><span>For memories that still make you smile.</span></button>
  <button onclick="chooseAtmosphere('romantic')">❤️ Romantic<br><span>For moments that changed your life.</span></button>
  <button onclick="chooseAtmosphere('hopeful')">🌅 Hopeful<br><span>For stories that deserve another beginning.</span></button>
</div>
  
<div id="creatorArea" style="display:none;">
  <div class="small" id="progressText"></div>
  <div class="dots" id="dots"></div>

  <div id="card" class="show">
    <div class="reflection" id="reflectionText"></div>
    <h1 id="questionTitle"></h1>
    <textarea id="answerInput"></textarea>
    <div class="encouragement" id="encouragementText"></div>
    <button id="nextBtn"></button>
  </div>
</div>

<div id="studioArea" style="display:none;">
  <div class="small">Creator Studio</div>
  <h1>Your Lumina experience is ready.</h1>
  <p>Review your story before entering the experience.</p>

  <div id="studioSummary" style="
    margin-top:22px;
    padding:18px;
    border:1px solid rgba(205,168,93,.35);
    border-radius:18px;
    background:#080604;
    text-align:left;
    line-height:1.6;
    color:#d8c7a5;
    font-size:15px;
  "></div>

  <button onclick="openPreview()">Preview Experience</button>
  <button onclick="location.reload()">Start Again</button>
</div>  
<div id="craftingArea" style="display:none;">
    <div class="small">Lumina</div>

    <h1 id="craftTitle">Your words have been collected.</h1>

    <p id="craftText">
        Preparing something meaningful...
    </p>

    <div class="craft-line"></div>
</div>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/atmosphere.js"></script>
<script src="assets/js/composer.js"></script>
<script src="assets/js/director.js"></script>
<script src="assets/js/scene.js"></script>
<script src="assets/js/conversation.js"></script>

</body>
</html>
