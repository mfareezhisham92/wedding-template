<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#0b0b0b;
color:white;
}

#openingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b0b0b;
z-index:9999;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.opening-content{
padding:20px;
}

.opening-content h1{
color:#D4AF37;
margin:15px 0;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;

background:
linear-gradient(
rgba(0,0,0,.6),
rgba(0,0,0,.8)
),
url("cover.jpg");

background-size:cover;
background-position:center;
}

.hero::before{
content:"";
position:absolute;

top:20px;
left:20px;
right:20px;
bottom:20px;

border:2px solid rgba(212,175,55,.5);

pointer-events:none;

z-index:3;
}

}
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;

background:
linear-gradient(
rgba(0,0,0,.6),
rgba(0,0,0,.8)
),
url("cover.jpg");

background-size:cover;
background-position:center;
}


.hero-content{
padding:20px;
position:relative;
z-index:2;
}


.hero h1{
font-family:'Cinzel',serif;
font-size:48px;
color:#D4AF37;

text-shadow:
0 0 10px rgba(212,175,55,0.5),
0 0 20px rgba(212,175,55,0.3);

margin:15px 0;
}


.section{
padding:60px 20px;
text-align:center;
}

.card{
background:rgba(255,255,255,.04);

max-width:350px;

margin:15px auto;

padding:25px;

border-radius:20px;

border:1px solid rgba(212,175,55,.3);

box-shadow:
0 8px 20px rgba(0,0,0,.4);
}


button{
background:linear-gradient(
45deg,
#D4AF37,
#b8941f
);

border:none;

padding:15px 28px;

border-radius:50px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

box-shadow:
0 5px 20px rgba(212,175,55,.3);
}

button:hover{
transform:translateY(-2px);
}


a{
text-decoration:none;
}

.gold{
color:#D4AF37;
}

</style>

</head>

<body>

<div id="openingScreen">

<div class="opening-content">

<p style="font-size:22px;margin-bottom:20px;">
بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ
</p>

<h3 style="letter-spacing:4px;color:#D4AF37;">
THE WEDDING OF
</h3>


<h1 id="openingCouple"></h1>

<button onclick="openInvitation()">
Buka Jemputan
</button>

</div>

</div>

<div class="hero">

<div class="hero-content">

<h3>THE WEDDING OF</h3>

<h1 id="couple"></h1>

<p id="tagline"></p>

<br>

<p id="date"></p>
<br>

<div id="countdown"
style="
margin-top:20px;
font-size:22px;
color:#D4AF37;
font-weight:bold;
padding:12px 24px;
border:1px solid rgba(212,175,55,.4);
border-radius:50px;
display:inline-block;
">
</div>

</div>

</div>

<div class="section">

<h2 class="gold">Walimatul Urus</h2>

<br>

<p id="host"></p>

<p>Dengan penuh kesyukuran menjemput anda ke majlis kami.</p>

</div>

<div class="section">

<div class="card">
<h3>Tarikh</h3>
<p id="date2"></p>
</div>

<div class="card">
<h3>Masa</h3>
<p id="time"></p>
</div>

<div class="card">
<h3>Lokasi</h3>
<p id="venue"></p>
</div>

</div>

<div class="section">

<a id="mapLink" target="_blank">

<button>📍 Lihat Lokasi</button>

</a>

</div>

<div class="section">

<a id="waLink" target="_blank">

<button>💬 RSVP WhatsApp</button>

</a>

</div>

<script>

function openInvitation(){
document.getElementById("openingScreen").style.display="none";
}

fetch("config.json")
.then(response => response.json())
.then(data => {

document.getElementById("openingCouple").innerText =
data.groom + " & " + data.bride;

document.getElementById("couple").innerText =
data.groom + " & " + data.bride;

document.getElementById("tagline").innerText =
data.tagline;

document.getElementById("date").innerText =
data.date;

document.getElementById("date2").innerText =
data.date;

document.getElementById("host").innerText =
data.host;

document.getElementById("time").innerText =
data.time;

document.getElementById("venue").innerText =
data.venue;
const targetDate = new Date(data.date);

setInterval(() => {

const now = new Date();

const diff = targetDate - now;

const days =
Math.floor(diff/(1000*60*60*24));

document.getElementById("countdown").innerHTML =
"⏳ " + days + " Hari Lagi";

},1000);
  

document.getElementById("mapLink").href =
data.maps;

document.getElementById("waLink").href =
"https://wa.me/" + data.rsvp +
"?text=Assalamualaikum.%20Saya%20ingin%20mengesahkan%20kehadiran.";

})
.catch(error => {
console.log(error);
});

</script>

</body>
</html>
