<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<style>

body{
margin:0;
font-family: 'Arial';
background:#0f0f0f;
color:#fff;
text-align:center;
}

.hero{
padding:80px 20px;
background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
}

.gold{
color:#D4AF37;
}

h1{
font-size:50px;
margin:10px 0;
}

.section{
padding:40px 20px;
}

.card{
background:#1a1a1a;
margin:10px;
padding:20px;
border-radius:10px;
}

button{
background:#D4AF37;
border:none;
padding:15px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

a{
text-decoration:none;
color:white;
}

.countdown{
font-size:20px;
margin-top:10px;
}

img{
width:90%;
max-width:300px;
border-radius:10px;
margin:10px;
}

</style>

</head>

<body>

<div class="hero">

<h3>THE WEDDING OF</h3>

<h1 class="gold">Alif & Alia</h1>

<p>Dua Jiwa Satu Cinta</p>

<h3>12 Jan 2027</h3>

<div class="countdown" id="countdown"></div>

</div>

<div class="section">

<h2 class="gold">Majlis Perkahwinan</h2>

<p>Dr R & Dr A</p>

<p>Dengan penuh kesyukuran menjemput anda</p>

</div>

<div class="section">

<div class="card">
<h3>Tarikh</h3>
<p>12 Jan 2027</p>
</div>

<div class="card">
<h3>Masa</h3>
<p>11:00 AM - 4:00 PM</p>
</div>

<div class="card">
<h3>Lokasi</h3>
<p>DPB</p>
</div>

</div>

<div class="section">

<a href="https://share.google/HERlD96hTu992uHGt">
<button>📍 Google Maps</button>
</a>

</div>

<div class="section">

<h2>Gallery</h2>

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

<div class="section">

<a href="https://wa.me/60123456789">
<button>💬 RSVP WhatsApp</button>
</a>

</div>

<script>

// Countdown
const eventDate = new Date("12 Jan 2027").getTime();

const x = setInterval(function() {

let now = new Date().getTime();
let distance = eventDate - now;

let days = Math.floor(distance / (1000 * 60 * 60 * 24));

document.getElementById("countdown").innerHTML =
days + " hari lagi";

}, 1000);

</script>

</body>
</html>
