<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Jemputan Digital Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Dancing+Script:wght@500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
const K = {
  groomName: "Faris",
  brideName: "Aisyah",
  eventType: "Walimatul Urus",

  eventDateISO: "2027-01-12T11:00:00+08:00",
  dateDisplay: "Selasa, 12 Januari 2027",
  timeDisplay: "11.00 pagi – 4.00 petang",

  hostName: "Dr Rosli bin Ahmad & Dr Aina binti Rashid",
  venueName: "DPB",
  venueAddress: "Dewan Perdana Ballroom",

  mapsURL: "https://maps.google.com",
  waNumber: "60123456789",
  waMessage: "Assalamualaikum, saya ingin mengesahkan kehadiran ke majlis. Terima kasih.",

  tagline: "Dua Jiwa Satu Cinta",
  customMsg: "Dengan penuh kesyukuran, kami menjemput Tuan/Puan hadir bersama menyerikan majlis kami.",
  closingMsg: "Kehadiran dan doa restu anda amat kami hargai."
};
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
font-family:'Nunito',sans-serif;
background:#060403;
color:#fff;
overflow:hidden;
text-align:center;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.9)),
url("cover.jpg");
background-size:cover;
background-position:center;
z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top,rgba(201,169,110,.24),transparent 35%),
radial-gradient(circle at bottom,rgba(201,169,110,.12),transparent 45%);
z-index:-1;
}

.gold{color:#c9a96e;}
.script{font-family:'Dancing Script',cursive;}
.serif{font-family:'Cormorant Garamond',serif;}

.small{
font-size:10px;
letter-spacing:.28em;
text-transform:uppercase;
}

.divider{
width:90px;
height:1px;
background:linear-gradient(90deg,transparent,#c9a96e,transparent);
margin:22px auto;
}

/* OPENING DOORS */
#doorScreen{
position:fixed;
inset:0;
z-index:50;
display:flex;
justify-content:center;
align-items:center;
background:#050302;
overflow:hidden;
}

.door{
position:absolute;
top:0;
width:50%;
height:100%;
background:
linear-gradient(90deg,#050302,#241805,#4a3510,#241805,#050302);
z-index:1;
transition:1.8s ease-in-out;
}

.leftDoor{
left:0;
border-right:1px solid rgba(201,169,110,.5);
}

.rightDoor{
right:0;
border-left:1px solid rgba(201,169,110,.5);
}

#doorScreen.open .leftDoor{
transform:translateX(-100%);
}

#doorScreen.open .rightDoor{
transform:translateX(100%);
}

.open-card{
z-index:2;
width:88%;
max-width:390px;
height:82vh;
border:1px solid rgba(201,169,110,.7);
background:rgba(0,0,0,.58);
backdrop-filter:blur(5px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:32px 24px;
position:relative;
box-shadow:0 0 45px rgba(201,169,110,.25);
transition:1s ease;
}

.open-card::before{
content:"";
position:absolute;
inset:13px;
border:1px solid rgba(201,169,110,.28);
}

.open-inner{
position:relative;
z-index:3;
}

.bismillah{
font-size:23px;
line-height:2;
color:#f7e5bd;
margin-bottom:26px;
}

.names{
font-family:'Cormorant Garamond',serif;

font-size:clamp(42px,8vw,58px);

font-weight:600;

line-height:1.25;

color:#f4dfb0;

margin:25px 0;

text-shadow:
0 0 8px rgba(201,169,110,.12);

letter-spacing:.02em;
}


.amp{
display:block;

font-size:26px;

font-family:'Cormorant Garamond',serif;

font-style:italic;

color:#c9a96e;

margin:6px 0;
}


button{
background:
linear-gradient(
135deg,
#f3d995,
#c9a96e
);

padding:16px 38px;

font-size:14px;

letter-spacing:.08em;

border-radius:999px;

box-shadow:
0 8px 25px rgba(201,169,110,.25);

transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

#doorScreen.open .open-card{
opacity:0;
transform:scale(.92);
}

/* MAIN INVITATION */
#main{
display:none;
height:100vh;
overflow-y:auto;
scroll-snap-type:y mandatory;
}

.page{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
scroll-snap-align:start;
}

.card{
width:100%;
max-width:420px;
min-height:82vh;
border:1px solid rgba(201,169,110,.7);
background:rgba(0,0,0,.62);
backdrop-filter:blur(5px);
padding:38px 24px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
box-shadow:0 0 45px rgba(201,169,110,.22);
}

.card::before{
content:"";
position:absolute;
inset:13px;
border:1px solid rgba(201,169,110,.28);
pointer-events:none;
}

.content{
position:relative;
z-index:2;
width:100%;
opacity:0;
transform:translateY(120px);
transition:opacity 2.5s ease, transform 2.5s cubic-bezier(.16,.84,.44,1);
}

.content.show{
opacity:1;
transform:translateY(0);
}

h1{
font-family:'Dancing Script',cursive;
font-size:clamp(42px,12vw,60px);
line-height:1.05;
color:#f7e5bd;
text-shadow:0 0 25px rgba(201,169,110,.35);
}

h2{
font-family:'Cormorant Garamond',serif;
font-style:italic;
font-size:32px;
color:#c9a96e;
margin-bottom:18px;
}

p{
font-size:15px;
line-height:1.85;
color:#fff7df;
}

.detail{
border:1px solid rgba(201,169,110,.4);
background:rgba(255,255,255,.07);
border-radius:16px;
padding:16px;
margin:12px 0;
}

.detail-label{
font-size:10px;
letter-spacing:.22em;
text-transform:uppercase;
color:#c9a96e;
margin-bottom:6px;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:22px;
}

.count-box{
border:1px solid rgba(201,169,110,.45);
background:rgba(255,255,255,.07);
border-radius:12px;
padding:10px 4px;
}

.count-box strong{
display:block;
font-family:'Cormorant Garamond',serif;
font-size:22px;
color:#c9a96e;
}

.count-box span{
font-size:9px;
letter-spacing:.12em;
color:#fff;
}

a{text-decoration:none;}

.action-btn{
display:block;
margin:12px auto;
}

.music{
position:fixed;
right:18px;
bottom:18px;
z-index:40;
width:48px;
height:48px;
border-radius:50%;
padding:0;
display:none;
font-size:18px;
}

/* gold particles */
.particle{
position:fixed;
width:4px;
height:4px;
background:#c9a96e;
border-radius:50%;
opacity:.55;
z-index:3;
animation:floatUp 8s linear infinite;
}

.particle:nth-child(1){left:12%;animation-delay:0s;}
.particle:nth-child(2){left:32%;animation-delay:2s;}
.particle:nth-child(3){left:52%;animation-delay:4s;}
.particle:nth-child(4){left:72%;animation-delay:1s;}
.particle:nth-child(5){left:88%;animation-delay:3s;}

@keyframes floatUp{
0%{bottom:-10px;opacity:0;}
30%{opacity:.6;}
100%{bottom:105vh;opacity:0;}
}

@media(max-width:480px){
.open-card,.card{
min-height:84vh;
padding:34px 22px;
}

p{font-size:14px;}

button{
width:86%;
max-width:285px;
}
}
</style>
</head>

<body>

<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music" id="musicBtn" onclick="toggleMusic()">♪</button>

<div id="doorScreen">
  <div class="door leftDoor"></div>
  <div class="door rightDoor"></div>

  <div class="open-card">
    <div class="open-inner">

  <p class="serif gold"
style="
font-size:28px;
font-style:italic;
font-weight:400;
letter-spacing:.04em;
margin-bottom:25px;
opacity:.9;
">
Walimatul Urus
</p>

  <div class="names" id="introNames"></div>

  <div class="divider"></div>

  <button onclick="openInvitation()">
    Tekan Untuk Buka
  </button>

</div>

  </div>
</div>

<main id="main">

<section class="page">
  <div class="card">
    <div class="content reveal">
      <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
      <div class="small gold">THE WEDDING OF</div>
      <h1 id="names"></h1>
      <div class="divider"></div>
      <p class="script gold" style="font-size:34px" id="tagline"></p>
      <p id="date"></p>
      <div class="countdown" id="countdown"></div>
    </div>
  </div>
</section>

<section class="page">
  <div class="card">
    <div class="content reveal">
      <h2 id="eventType"></h2>
      <div class="divider"></div>
      <p id="host"></p>
      <br>
      <p id="message"></p>
    </div>
  </div>
</section>

<section class="page">
  <div class="card">
    <div class="content reveal">
      <h2>Butiran Majlis</h2>

      <div class="detail">
        <div class="detail-label">Tarikh</div>
        <p id="date2"></p>
      </div>

      <div class="detail">
        <div class="detail-label">Masa</div>
        <p id="time"></p>
      </div>

      <div class="detail">
        <div class="detail-label">Lokasi</div>
        <p id="venue"></p>
        <p style="font-size:12px;opacity:.7" id="address"></p>
      </div>
    </div>
  </div>
</section>

<section class="page">
  <div class="card">
    <div class="content reveal">
      <h2>Lokasi & RSVP</h2>
      <div class="divider"></div>

      <a id="mapLink" target="_blank" class="action-btn">
        <button>📍 Lihat Lokasi</button>
      </a>

      <a id="waLink" target="_blank" class="action-btn">
        <button>💬 RSVP WhatsApp</button>
      </a>
    </div>
  </div>
</section>

<section class="page">
  <div class="card">
    <div class="content reveal">
      <h2 class="script" style="font-size:44px">Terima Kasih</h2>
      <div class="divider"></div>
      <p id="closing"></p>
      <br>
      <div class="small gold" id="closingNames"></div>
    </div>
  </div>
</section>

</main>

<script>
let musicPlaying=false;

function fillData(){

document.getElementById("introNames").innerHTML=K.groomName+'<span class="amp">&</span>'+K.brideName;


document.getElementById("names").innerHTML=K.groomName+'<span class="amp">&</span>'+K.brideName;
document.getElementById("tagline").innerText=K.tagline;
document.getElementById("date").innerText=K.dateDisplay;
document.getElementById("eventType").innerText=K.eventType;
document.getElementById("host").innerText=K.hostName;
document.getElementById("message").innerText=K.customMsg;
document.getElementById("date2").innerText=K.dateDisplay;
document.getElementById("time").innerText=K.timeDisplay;
document.getElementById("venue").innerText=K.venueName;
document.getElementById("address").innerText=K.venueAddress;
document.getElementById("closing").innerText=K.closingMsg;
document.getElementById("closingNames").innerText=K.groomName+" & "+K.brideName;

document.getElementById("mapLink").href=K.mapsURL;
document.getElementById("waLink").href="https://wa.me/"+K.waNumber+"?text="+encodeURIComponent(K.waMessage);
}

function openInvitation(){
const door=document.getElementById("doorScreen");
door.classList.add("open");

document.getElementById("musicBtn").style.display="block";

const music=document.getElementById("bgMusic");
music.play().then(()=>{
musicPlaying=true;
document.getElementById("musicBtn").innerText="♪";
}).catch(()=>{musicPlaying=false;});

setTimeout(()=>{
door.style.display="none";
document.getElementById("main").style.display="block";
document.body.style.overflow="auto";

setTimeout(()=>{
document.querySelectorAll(".reveal")[0].classList.add("show");
},400);

},1900);
}

function toggleMusic(){
const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

if(musicPlaying){
music.pause();
btn.innerText="×";
musicPlaying=false;
}else{
music.play();
btn.innerText="♪";
musicPlaying=true;
}
}

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
setTimeout(()=>{
entry.target.classList.add("show");
},300);
}
});
},{threshold:.45});

document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

function countdown(){
const target=new Date(K.eventDateISO);

setInterval(()=>{
const diff=target-new Date();

const d=Math.max(0,Math.floor(diff/(1000*60*60*24)));
const h=Math.max(0,Math.floor((diff/(1000*60*60))%24));
const m=Math.max(0,Math.floor((diff/(1000*60))%60));
const s=Math.max(0,Math.floor((diff/1000)%60));

document.getElementById("countdown").innerHTML=`
<div class="count-box"><strong>${d}</strong><span>HARI</span></div>
<div class="count-box"><strong>${h}</strong><span>JAM</span></div>
<div class="count-box"><strong>${m}</strong><span>MINIT</span></div>
<div class="count-box"><strong>${s}</strong><span>SAAT</span></div>
`;
},1000);
}

fillData();
countdown();
</script>

</body>
</html>
