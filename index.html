<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Jemputan Digital Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Dancing+Script:wght@500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
const K = {
  guestName: "Encik Rizal & Keluarga",
  groomName: "Ahmad Faris",
  brideName: "Siti Aisyah",
  eventType: "Walimatul Urus",

  eventDateISO: "2027-01-12T11:00:00+08:00",
  dateDisplay: "Selasa, 12 Januari 2027",
  timeDisplay: "11.00 pagi – 4.00 petang",

  hostName: "Dr R & Dr A",
  venueName: "DPB",
  venueAddress: "Dewan Perdana Ballroom",
  mapsURL: "https://maps.google.com",
  wazeURL: "https://waze.com",

  waNumber: "60123456789",
  waMessage: "Assalamualaikum, saya ingin mengesahkan kehadiran ke majlis Alif & Alia. Terima kasih.",

  tagline: "Dua Jiwa Satu Cinta",
  customMsg: "Dengan penuh kesyukuran, kami menjemput Tuan/Puan hadir bersama menyerikan majlis kami.",
  closingMsg: "Kehadiran dan doa restu anda amat kami hargai."
};
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
height:100%;
overflow:hidden;
font-family:'Nunito',sans-serif;
background:#070504;
color:#fff;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.92)),
url("cover.jpg");
background-size:cover;
background-position:center;
z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top,rgba(201,169,110,.25),transparent 35%),
radial-gradient(circle at bottom,rgba(201,169,110,.14),transparent 45%);
z-index:-1;
}

.serif{font-family:'Cormorant Garamond',serif}
.script{font-family:'Dancing Script',cursive}
.gold{color:#c9a96e}
.small{
font-size:10px;
letter-spacing:.28em;
text-transform:uppercase;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
z-index:30;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
background:rgba(0,0,0,.75);
}

.intro-card{
width:100%;
max-width:390px;
height:84vh;
border:1px solid rgba(201,169,110,.65);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:32px 24px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(5px);
box-shadow:0 0 45px rgba(201,169,110,.2);
position:relative;
}

.intro-card::before{
content:"";
position:absolute;
inset:13px;
border:1px solid rgba(201,169,110,.25);
}

.intro-inner{
position:relative;
z-index:2;
}

.bismillah{
font-size:23px;
line-height:2;
margin-bottom:26px;
color:#f6e2b0;
}

.names{
font-family:'Dancing Script',cursive;
font-size:clamp(38px,11vw,54px);
line-height:1.08;
color:#f7e5bd;
margin:18px 0;
}

.amp{
display:block;
font-family:'Nunito',sans-serif;
font-size:13px;
letter-spacing:.25em;
color:#c9a96e;
margin:8px 0;
}

.divider{
width:90px;
height:1px;
background:linear-gradient(90deg,transparent,#c9a96e,transparent);
margin:22px auto;
}

button{
border:none;
background:linear-gradient(135deg,#f7df9b,#b88a2c);
color:#1d1306;
font-weight:700;
padding:14px 30px;
border-radius:999px;
box-shadow:0 10px 30px rgba(201,169,110,.35);
cursor:pointer;
}

/* ENVELOPE */
#envelopeScene{
position:fixed;
inset:0;
z-index:25;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.88);
perspective:1200px;
}

.envelope{
width:310px;
height:215px;
position:relative;
transform-style:preserve-3d;
animation:envIn 1s ease forwards;
}

.env-back{
position:absolute;
inset:0;
background:linear-gradient(145deg,#2d2008,#080604);
border:1px solid rgba(201,169,110,.8);
box-shadow:0 0 50px rgba(201,169,110,.25);
}

.env-flap{
position:absolute;
top:0;
left:0;
width:100%;
height:58%;
background:linear-gradient(145deg,#d7b777,#624512);
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
z-index:5;
}

.env-letter{
position:absolute;
left:22px;
right:22px;
bottom:18px;
height:160px;
background:#fff7df;
border:1px solid #c9a96e;
display:flex;
align-items:center;
justify-content:center;
font-family:'Dancing Script',cursive;
font-size:34px;
color:#2d2008;
z-index:2;
}

.env-left{
position:absolute;
left:0;
bottom:0;
width:50%;
height:100%;
background:linear-gradient(145deg,#171005,#050403);
clip-path:polygon(0 0,100% 50%,0 100%);
z-index:4;
}

.env-right{
position:absolute;
right:0;
bottom:0;
width:50%;
height:100%;
background:linear-gradient(145deg,#171005,#050403);
clip-path:polygon(100% 0,0 50%,100% 100%);
z-index:4;
}

.env-bottom{
position:absolute;
left:0;
bottom:0;
width:100%;
height:58%;
background:linear-gradient(145deg,#2a1d07,#070504);
clip-path:polygon(0 100%,50% 0,100% 100%);
z-index:4;
}

#envelopeScene.open .env-flap{animation:flapOpen 1.5s ease forwards}
#envelopeScene.open .env-letter{animation:letterRise 1.9s ease forwards .7s}
#envelopeScene.open .envelope{animation:envOut 1s ease forwards 2.7s}

@keyframes envIn{
from{opacity:0;transform:translateY(90px) scale(.9)}
to{opacity:1;transform:translateY(0) scale(1)}
}

@keyframes flapOpen{
to{transform:rotateX(180deg)}
}

@keyframes letterRise{
to{transform:translateY(-175px);opacity:0}
}

@keyframes envOut{
to{opacity:0;transform:scale(.88)}
}

/* MAIN CREDIT FLOW */
#main{
display:none;
height:100vh;
overflow:hidden;
position:relative;
}

.frame{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
}

.card{
width:100%;
max-width:420px;
height:84vh;
border:1px solid rgba(201,169,110,.65);
background:rgba(0,0,0,.55);
backdrop-filter:blur(5px);
position:relative;
overflow:hidden;
box-shadow:0 0 45px rgba(201,169,110,.2);
}

.card::before{
content:"";
position:absolute;
inset:13px;
border:1px solid rgba(201,169,110,.25);
z-index:4;
pointer-events:none;
}

.credits{
position:absolute;
left:28px;
right:28px;
bottom:-120%;
animation:rollCredits 54s linear forwards;
}

.scene{
height:66vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 0;
opacity:0;
animation:fadeScene 9s ease-in-out forwards;
}

.scene:nth-child(1){animation-delay:0s}
.scene:nth-child(2){animation-delay:9s}
.scene:nth-child(3){animation-delay:18s}
.scene:nth-child(4){animation-delay:27s}
.scene:nth-child(5){animation-delay:36s}

@keyframes rollCredits{
from{transform:translateY(0)}
to{transform:translateY(-208%)}
}

@keyframes fadeScene{
0%{opacity:0;transform:translateY(120px)}
24%{opacity:1;transform:translateY(0)}
76%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-85px)}
}

h1{
font-family:'Dancing Script',cursive;
font-size:clamp(42px,12vw,58px);
line-height:1.05;
color:#f7e5bd;
}

h2{
font-family:'Cormorant Garamond',serif;
font-style:italic;
font-size:32px;
color:#c9a96e;
margin-bottom:18px;
}

p{
font-size:15px;
line-height:1.85;
}

.detail{
width:100%;
border:1px solid rgba(201,169,110,.35);
border-radius:16px;
padding:16px;
margin:10px 0;
background:rgba(255,255,255,.055);
}

.detail .label{
font-size:10px;
letter-spacing:.2em;
text-transform:uppercase;
color:#c9a96e;
margin-bottom:6px;
}

.cd{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
width:100%;
margin-top:20px;
}

.cd-box{
border:1px solid rgba(201,169,110,.4);
border-radius:12px;
padding:10px 4px;
background:rgba(255,255,255,.06);
}

.cd-box strong{
display:block;
font-size:20px;
color:#c9a96e;
font-family:'Cormorant Garamond',serif;
}

.cd-box span{
font-size:9px;
letter-spacing:.12em;
}

.action-btn{
display:block;
margin:12px auto;
max-width:290px;
text-decoration:none;
}

.music{
position:fixed;
right:18px;
bottom:18px;
z-index:40;
width:48px;
height:48px;
border-radius:50%;
padding:0;
display:none;
font-size:18px;
}

/* particles */
.particle{
position:fixed;
width:4px;
height:4px;
background:#c9a96e;
border-radius:50%;
opacity:.55;
z-index:3;
animation:floatUp 8s linear infinite;
}

.particle:nth-child(1){left:12%;animation-delay:0s}
.particle:nth-child(2){left:32%;animation-delay:2s}
.particle:nth-child(3){left:52%;animation-delay:4s}
.particle:nth-child(4){left:72%;animation-delay:1s}
.particle:nth-child(5){left:88%;animation-delay:3s}

@keyframes floatUp{
0%{bottom:-10px;opacity:0}
30%{opacity:.6}
100%{bottom:105vh;opacity:0}
}

@media(max-width:480px){
.intro-card,.card{height:86vh}
p{font-size:14px}
button{width:86%;max-width:285px}
}
</style>
</head>

<body>

<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music" id="musicBtn" onclick="toggleMusic()">♪</button>

<div id="intro">
  <div class="intro-card">
    <div class="intro-inner">
      <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
      <div class="small gold" id="introEvent"></div>
      <div class="names" id="introNames"></div>
      <div class="divider"></div>
      <div class="serif gold" id="introDate"></div>
      <button onclick="startInvitation()">Buka Jemputan</button>
    </div>
  </div>
</div>

<div id="envelopeScene">
  <div class="envelope">
    <div class="env-back"></div>
    <div class="env-letter">You're Invited</div>
    <div class="env-flap"></div>
    <div class="env-left"></div>
    <div class="env-right"></div>
    <div class="env-bottom"></div>
  </div>
</div>

<main id="main">
  <div class="frame">
    <div class="card">
      <div class="credits">

        <section class="scene">
          <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
          <div class="small gold">THE WEDDING OF</div>
          <h1 id="names"></h1>
          <div class="divider"></div>
          <p class="script gold" style="font-size:34px" id="tagline"></p>
          <p id="date"></p>
          <div class="cd" id="countdown"></div>
        </section>

        <section class="scene">
          <h2 id="eventType"></h2>
          <div class="divider"></div>
          <p id="host"></p>
          <br>
          <p id="message"></p>
        </section>

        <section class="scene">
          <h2>Butiran Majlis</h2>
          <div class="detail"><div class="label">Tarikh</div><p id="date2"></p></div>
          <div class="detail"><div class="label">Masa</div><p id="time"></p></div>
          <div class="detail"><div class="label">Lokasi</div><p id="venue"></p><small id="address"></small></div>
        </section>

        <section class="scene">
          <h2>Lokasi & RSVP</h2>
          <div class="divider"></div>
          <a id="mapLink" target="_blank" class="action-btn"><button>📍 Lihat Lokasi</button></a>
          <a id="waLink" target="_blank" class="action-btn"><button>💬 RSVP WhatsApp</button></a>
        </section>

        <section class="scene">
          <h2 class="script" style="font-size:44px">Terima Kasih</h2>
          <div class="divider"></div>
          <p id="closing"></p>
          <br>
          <div class="small gold" id="closingNames"></div>
        </section>

      </div>
    </div>
  </div>
</main>

<script>
let musicPlaying=false;

function fillData(){
document.getElementById("introEvent").innerText=K.eventType;
document.getElementById("introNames").innerHTML=K.groomName+'<span class="amp">&</span>'+K.brideName;
document.getElementById("introDate").innerText=K.dateDisplay;

document.getElementById("names").innerHTML=K.groomName+'<span class="amp">&</span>'+K.brideName;
document.getElementById("tagline").innerText=K.tagline;
document.getElementById("date").innerText=K.dateDisplay;
document.getElementById("eventType").innerText=K.eventType;
document.getElementById("host").innerText=K.hostName;
document.getElementById("message").innerText=K.customMsg;
document.getElementById("date2").innerText=K.dateDisplay;
document.getElementById("time").innerText=K.timeDisplay;
document.getElementById("venue").innerText=K.venueName;
document.getElementById("address").innerText=K.venueAddress;
document.getElementById("closing").innerText=K.closingMsg;
document.getElementById("closingNames").innerText=K.groomName+" & "+K.brideName;

document.getElementById("mapLink").href=K.mapsURL;
document.getElementById("waLink").href="https://wa.me/"+K.waNumber+"?text="+encodeURIComponent(K.waMessage);
}

function startInvitation(){
document.getElementById("intro").style.display="none";

const env=document.getElementById("envelopeScene");
env.style.display="flex";

setTimeout(()=>env.classList.add("open"),250);

document.getElementById("musicBtn").style.display="block";
const music=document.getElementById("bgMusic");

music.play().then(()=>{
musicPlaying=true;
document.getElementById("musicBtn").innerText="♪";
}).catch(()=>{ musicPlaying=false; });

setTimeout(()=>{
env.style.display="none";
document.getElementById("main").style.display="block";
},3600);
}

function toggleMusic(){
const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

if(musicPlaying){
music.pause();
btn.innerText="×";
musicPlaying=false;
}else{
music.play();
btn.innerText="♪";
musicPlaying=true;
}
}

function countdown(){
const target=new Date(K.eventDateISO);

setInterval(()=>{
const diff=target-new Date();

const d=Math.max(0,Math.floor(diff/(1000*60*60*24)));
const h=Math.max(0,Math.floor((diff/(1000*60*60))%24));
const m=Math.max(0,Math.floor((diff/(1000*60))%60));
const s=Math.max(0,Math.floor((diff/1000)%60));

document.getElementById("countdown").innerHTML=`
<div class="cd-box"><strong>${d}</strong><span>HARI</span></div>
<div class="cd-box"><strong>${h}</strong><span>JAM</span></div>
<div class="cd-box"><strong>${m}</strong><span>MINIT</span></div>
<div class="cd-box"><strong>${s}</strong><span>SAAT</span></div>
`;
},1000);
}

fillData();
countdown();
</script>

</body>
</html>
