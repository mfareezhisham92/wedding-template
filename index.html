<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#0b0b0b;
color:white;
}

#openingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b0b0b;
z-index:9999;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.opening-content{
padding:20px;
}

.opening-content h1{
color:#D4AF37;
margin:15px 0;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;

background:
linear-gradient(
rgba(0,0,0,.6),
rgba(0,0,0,.8)
),
url("cover.jpg");

background-size:cover;
background-position:center;
}

.hero-content{
padding:20px;
}

.hero h1{
font-family:'Cinzel',serif;
font-size:48px;
color:#D4AF37;

text-shadow:
0 0 10px rgba(212,175,55,0.5),
0 0 20px rgba(212,175,55,0.3);

margin:15px 0;
}


.section{
padding:60px 20px;
text-align:center;
}

.card{
background:#161616;
max-width:350px;
margin:15px auto;
padding:20px;
border-radius:15px;
border:1px solid rgba(212,175,55,.3);
}

button{
background:#D4AF37;
border:none;
padding:14px 24px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
}

a{
text-decoration:none;
}

.gold{
color:#D4AF37;
}

</style>

</head>

<body>

<div id="openingScreen">

<div class="opening-content">

<p>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>

<h3>THE WEDDING OF</h3>

<h1 id="openingCouple"></h1>

<button onclick="openInvitation()">
Buka Jemputan
</button>

</div>

</div>

<div class="hero">

<div class="hero-content">

<h3>THE WEDDING OF</h3>

<h1 id="couple"></h1>

<p id="tagline"></p>

<br>

<p id="date"></p>

</div>

</div>

<div class="section">

<h2 class="gold">Walimatul Urus</h2>

<br>

<p id="host"></p>

<p>Dengan penuh kesyukuran menjemput anda ke majlis kami.</p>

</div>

<div class="section">

<div class="card">
<h3>Tarikh</h3>
<p id="date2"></p>
</div>

<div class="card">
<h3>Masa</h3>
<p id="time"></p>
</div>

<div class="card">
<h3>Lokasi</h3>
<p id="venue"></p>
</div>

</div>

<div class="section">

<a id="mapLink" target="_blank">

<button>📍 Lihat Lokasi</button>

</a>

</div>

<div class="section">

<a id="waLink" target="_blank">

<button>💬 RSVP WhatsApp</button>

</a>

</div>

<script>

function openInvitation(){
document.getElementById("openingScreen").style.display="none";
}

fetch("config.json")
.then(response => response.json())
.then(data => {

document.getElementById("openingCouple").innerText =
data.groom + " & " + data.bride;

document.getElementById("couple").innerText =
data.groom + " & " + data.bride;

document.getElementById("tagline").innerText =
data.tagline;

document.getElementById("date").innerText =
data.date;

document.getElementById("date2").innerText =
data.date;

document.getElementById("host").innerText =
data.host;

document.getElementById("time").innerText =
data.time;

document.getElementById("venue").innerText =
data.venue;

document.getElementById("mapLink").href =
data.maps;

document.getElementById("waLink").href =
"https://wa.me/" + data.rsvp +
"?text=Assalamualaikum.%20Saya%20ingin%20mengesahkan%20kehadiran.";

})
.catch(error => {
console.log(error);
});

</script>

</body>
</html>
