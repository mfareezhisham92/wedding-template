<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Lumina</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
background:#080604;
color:#f3ead8;
font-family:Georgia,serif;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.app{
width:100%;
max-width:430px;
min-height:100dvh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
radial-gradient(circle at top,rgba(205,168,93,.22),transparent 36%),
linear-gradient(180deg,#080604,#151006 55%,#080604);
padding:34px 28px;
}

.small{
font-size:12px;
letter-spacing:.22em;
text-transform:uppercase;
color:#cda85d;
margin-bottom:26px;
}

h1{
font-size:38px;
line-height:1.15;
margin-bottom:28px;
}

p{
font-size:20px;
line-height:1.7;
color:#d8c7a5;
max-width:340px;
margin-bottom:18px;
}

button{
margin-top:28px;
padding:14px 34px;
border-radius:16px;
border:1px solid #cda85d;
background:rgba(0,0,0,.18);
color:#f4d88d;
font-size:18px;
font-family:Georgia,serif;
cursor:pointer;
box-shadow:0 0 35px rgba(205,168,93,.18);
}

.fade{
animation:fadeIn 1.6s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="app fade">
  <div class="small">Lumina</div>

  <h1>Before we begin...</h1>

  <p>Some thoughts are difficult to express.</p>
  <p>Some feelings stay with us for years.</p>
  <p>Lumina helps turn those thoughts into something meaningful.</p>

  <button onclick="window.location.href='creator.html'">Begin</button>
</div>

</body>
</html>
