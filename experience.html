<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Experience</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
background:#080604;
color:#f3ead8;
font-family:Georgia,serif;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#stage{
width:100%;
max-width:430px;
height:100dvh;
position:relative;
overflow:hidden;
background:
radial-gradient(circle at top,rgba(205,168,93,.22),transparent 36%),
linear-gradient(180deg,#080604,#151006 55%,#080604);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:34px 28px;
}

.moment{
opacity:0;
transform:translateY(28px);
animation:momentIn 1.4s ease forwards;
}

.label{
color:#cda85d;
font-size:12px;
letter-spacing:.22em;
text-transform:uppercase;
margin-bottom:24px;
}

h1{
font-size:36px;
line-height:1.15;
margin-bottom:24px;
}

p{
font-size:20px;
line-height:1.65;
color:#d8c7a5;
max-width:340px;
}

@keyframes momentIn{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div id="stage"></div>

<script src="assets/js/player.js"></script>

</body>
</html>
