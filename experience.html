<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Experience</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
background:#080604;
color:#f3ead8;
font-family:Georgia,serif;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#stage{
width:100%;
max-width:430px;
height:100dvh;
position:relative;
overflow:hidden;
background:
radial-gradient(circle at top,rgba(205,168,93,.22),transparent 36%),
linear-gradient(180deg,#080604,#151006 55%,#080604);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:34px 28px;
}

.moment{
opacity:0;
transform:translateY(28px);
animation:momentIn 1.4s ease forwards;
}

.label{
color:#cda85d;
font-size:12px;
letter-spacing:.22em;
text-transform:uppercase;
margin-bottom:24px;
}

h1{
font-size:36px;
line-height:1.15;
margin-bottom:24px;
}

p{
font-size:20px;
line-height:1.65;
color:#d8c7a5;
max-width:340px;
}

@keyframes momentIn{
to{
opacity:1;
transform:translateY(0);
}
}
.fade-out{
opacity:.08;
transition:opacity .7s ease;
}

.fade-in{
opacity:1;
transition:opacity .9s ease;
}

.photo-moment{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
padding:34px;
}

.photo-frame{
width:82%;
max-width:330px;
height:58vh;
border-radius:24px;
overflow:hidden;
box-shadow:0 0 55px rgba(205,168,93,.24);
opacity:0;
transform:scale(.82);
animation:
photoArrive
calc(var(--photo-duration, 10000ms) * .24)
ease
forwards;
}

.photo-frame img{
width:100%;
height:100%;
object-fit:cover;
transform:scale(1);
animation:
photoDrift
var(--photo-duration, 10000ms)
ease-in-out
forwards;
}

@keyframes photoArrive{
0%{
opacity:0;
transform:scale(.78);
filter:brightness(.45) blur(3px);
}
60%{
opacity:1;
filter:brightness(.85) blur(0);
}
100%{
opacity:1;
transform:scale(.92);
filter:brightness(1);
}
}

@keyframes photoDrift{
0%,20%{
transform:scale(1);
}
85%{
transform:scale(1.12);
}
100%{
transform:scale(1.12);
}
}

.photo-romantic .photo-frame{
box-shadow:
0 0 70px rgba(205,168,93,.28),
0 18px 55px rgba(0,0,0,.45);
}

.photo-warm .photo-frame{
filter:sepia(.08) saturate(.94);
}

.photo-bright .photo-frame{
filter:brightness(1.06) saturate(1.06);
}

.photo-elegant .photo-frame{
border:1px solid rgba(205,168,93,.48);
}

.photo-classic .photo-frame{
border-radius:14px;
}

.photo-nostalgic .photo-frame{
filter:sepia(.16) contrast(.94);
}

.photo-soft .photo-frame{
box-shadow:
0 0 80px rgba(243,234,216,.16),
0 18px 55px rgba(0,0,0,.38);
}

.photo-hopeful .photo-frame{
filter:brightness(1.04);
}
  
</style>
</head>

<body>

<div id="stage"></div>
  
<script src="assets/js/components.js"></script>
<script src="assets/js/player.js"></script>

</body>
</html>
