<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Royal Collection v0.1</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#050302;
font-family:'Cormorant Garamond',serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
}

#stage{
width:100%;
max-width:430px;
height:100dvh;
position:relative;
overflow:hidden;
background:
radial-gradient(circle at top,rgba(214,168,74,.22),transparent 34%),
linear-gradient(180deg,#050302,#130d05 52%,#050302);
color:#e8d6a8;
}

#dust{
position:absolute;
inset:0;
z-index:1;
pointer-events:none;
}

.spotlight{
position:absolute;
top:-18%;
left:50%;
width:280px;
height:480px;
transform:translateX(-50%);
background:radial-gradient(ellipse,rgba(255,220,120,.35),transparent 70%);
filter:blur(22px);
animation:lightBreath 5s ease-in-out infinite;
z-index:2;
}

.content{
position:relative;
z-index:3;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:2rem;
}

.frame{
position:absolute;
width:84%;
height:82%;
border:1px solid rgba(214,168,74,.65);
box-shadow:
0 0 38px rgba(214,168,74,.16),
inset 0 0 30px rgba(214,168,74,.05);
animation:floatFrame 6s ease-in-out infinite;
}

.frame::before{
content:"";
position:absolute;
inset:12px;
border:1px solid rgba(214,168,74,.25);
}

.title{
font-size:clamp(2.1rem,9vw,3rem);
font-style:italic;
color:#d6a84a;
margin-bottom:3.2rem;
opacity:0;
animation:fadeUp 1.8s ease forwards 1.2s;
}

.names{
font-family:'Cinzel',serif;
font-size:clamp(2rem,9vw,2.8rem);
letter-spacing:.14em;
line-height:1.25;
font-weight:500;
background:linear-gradient(110deg,#9d6d16,#d6a84a,#fff2b7,#d6a84a,#9d6d16);
background-size:300% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
filter:drop-shadow(0 0 12px rgba(214,168,74,.32));
animation:goldMove 6s linear infinite, fadeUp 1.8s ease forwards 2.6s;
opacity:0;
}

.amp{
display:block;
font-family:'Cormorant Garamond',serif;
font-style:italic;
font-size:clamp(1.6rem,7vw,2.2rem);
letter-spacing:0;
margin:.4rem 0;
color:#d6a84a;
-webkit-text-fill-color:#d6a84a;
animation:floatAmp 4.5s ease-in-out infinite;
}

.date{
font-size:clamp(1.1rem,5vw,1.4rem);
font-style:italic;
color:#d8bd75;
margin:3.2rem 0 1.6rem;
opacity:0;
animation:fadeUp 1.8s ease forwards 4.2s;
}

.line{
width:170px;
height:1px;
background:linear-gradient(90deg,transparent,#d6a84a,transparent);
margin-bottom:1.6rem;
transform:scaleX(0);
animation:lineGrow 1.5s ease forwards 5.3s;
}

button{
background:rgba(0,0,0,.22);
border:1px solid #d6a84a;
color:#f3d57b;
font-family:'Cormorant Garamond',serif;
font-size:1.25rem;
padding:.75rem 2.4rem;
border-radius:16px;
cursor:pointer;
opacity:0;
animation:fadeUp 1.5s ease forwards 5.8s, btnBreath 2.7s ease-in-out infinite 7s;
}

#stage.opening .gold-sweep{
animation:sweep 1.1s ease forwards;
}

.gold-sweep{
position:absolute;
inset:0;
z-index:10;
background:linear-gradient(115deg,transparent 40%,rgba(255,229,157,.7) 50%,transparent 60%);
transform:translateX(-130%);
pointer-events:none;
}

.next{
position:absolute;
inset:0;
z-index:0;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:2rem;
opacity:0;
transform:translateY(80px);
transition:opacity 1.4s ease,transform 1.4s ease;
}

.next.show{
z-index:20;
opacity:1;
transform:translateY(0);
}

.next h1{
font-family:'Cinzel',serif;
font-size:1.7rem;
color:#d6a84a;
letter-spacing:.08em;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(28px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes goldMove{
0%{background-position:200% center}
100%{background-position:-200% center}
}

@keyframes lineGrow{
to{transform:scaleX(1)}
}

@keyframes floatFrame{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-7px)}
}

@keyframes floatAmp{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-5px)}
}

@keyframes lightBreath{
0%,100%{opacity:.45;transform:translateX(-50%) scale(1)}
50%{opacity:.8;transform:translateX(-50%) scale(1.08)}
}

@keyframes btnBreath{
0%,100%{box-shadow:0 0 14px rgba(214,168,74,.25)}
50%{box-shadow:0 0 34px rgba(214,168,74,.7)}
}

@keyframes sweep{
0%{transform:translateX(-130%);opacity:0}
25%{opacity:1}
100%{transform:translateX(130%);opacity:0}
}
</style>
</head>

<body>

<div id="stage">
<canvas id="dust"></canvas>
<div class="spotlight"></div>
<div class="gold-sweep"></div>

<div class="content" id="intro">
<div class="frame"></div>

<div class="title">Walimatul Urus</div>

<div class="names">
ADAM
<span class="amp">&amp;</span>
HAWA
</div>

<div class="date">Ahad • 12 Julai 2026</div>
<div class="line"></div>

<button onclick="openInvite()">Buka Jemputan</button>
</div>

<div class="next" id="next">
<h1>Invitation Content<br>Coming Next</h1>
</div>
</div>

<script>
const canvas = document.getElementById("dust");
const ctx = canvas.getContext("2d");
const stage = document.getElementById("stage");

function resize(){
canvas.width = stage.offsetWidth;
canvas.height = stage.offsetHeight;
}
resize();
window.addEventListener("resize",resize);

const particles = Array.from({length:55},()=>createParticle());

function createParticle(){
return{
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.7+.4,
vx:(Math.random()-.5)*.18,
vy:-(Math.random()*.28+.08),
alpha:Math.random()*.55+.18,
twinkle:Math.random()*Math.PI*2
};
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x += p.vx + Math.sin(p.twinkle)*.05;
p.y += p.vy;
p.twinkle += .025;

if(p.y < -10){
Object.assign(p,createParticle());
p.y = canvas.height + 10;
}

ctx.globalAlpha = p.alpha * (.65 + .35*Math.sin(p.twinkle));
ctx.fillStyle = "#d6a84a";
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(draw);
}
draw();

function openInvite(){
stage.classList.add("opening");

setTimeout(()=>{
document.getElementById("intro").style.opacity="0";
},700);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("next").classList.add("show");
},1200);
}
</script>

</body>
</html>
